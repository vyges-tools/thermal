# Matrix multi-platform release build.
# Triggers: a pushed tag `v*` (the tag IS the release), or a manual run with an
# explicit tag input. The tag is read from inputs.tag (dispatch) or the ref (push).
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,        target: aarch64-apple-darwin }
          - { os: ubuntu-latest,   target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
    steps:
      - uses: actions/checkout@v4
      # dep-mode: fetch the shared foundation and repoint the dev path dep at it
      # (vyges-tools/loom is public at launch -> anonymous; pre-launch add a `token:`).
      - name: Fetch the vyges-tools/loom foundation
        uses: actions/checkout@v4
        with:
          repository: vyges-tools/loom
          path: .deps/vyges-tools-loom
      - name: Repoint the path dependency at the CI checkout
        shell: bash
        run: sed -i.bak 's#\.\./vyges-tools-loom#.deps/vyges-tools-loom#' Cargo.toml && rm -f Cargo.toml.bak
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          bin="vyges-${GITHUB_REPOSITORY##*/}"
          stage="${bin}-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/${bin}" "$stage/"
          cp README.md LICENSE NOTICE "$stage/"
          tar -czf "${stage}.tar.gz" "$stage"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "*.tar.gz"

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum *.tar.gz > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
